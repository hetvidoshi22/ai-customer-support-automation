<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Customer Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <h1>🚀 AI Customer Intelligence Dashboard</h1>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>Total Queries</h3>
            <p id="totalQueries">--</p>
        </div>
        <div class="card">
            <h3>Total Categories</h3>
            <p id="totalCategories">--</p>
        </div>
        <div class="card">
            <h3>Top Issue</h3>
            <p id="topIssue">--</p>
        </div>
    </div>

    <!-- Pie Chart -->
    <div class="chart-box">
        <h2>📊 Query Distribution</h2>
        <p>Shows how customer queries are distributed across categories</p>
        <canvas id="pieChart"></canvas>
    </div>

    <!-- Line Chart -->
    <div class="chart-box">
        <h2>📈 Daily Query Trend</h2>
        <p>Tracks number of queries received each day</p>
        <canvas id="lineChart"></canvas>
    </div>

    <select id="sourceSelect">
        <option value="WhatsApp">WhatsApp</option>
        <option value="Instagram">Instagram</option>
        <option value="Email">Email</option>
        <option value="Website">Website</option>
    </select>

    <!-- Query Input -->
    <div class="query-box">
        <h2>🤖 Classify Customer Query</h2>
        <textarea id="queryInput" placeholder="Enter customer query..."></textarea>
        <button id="classifyBtn">⚡ Classify with AI</button>
    </div>

    <!-- Result -->
    <div id="resultBox" class="result hidden"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
