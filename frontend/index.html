<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Customer Intelligence Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <h1>🚀 AI Customer Intelligence Dashboard</h1>

    <!-- Top Cards -->
    <div class="cards">
        <div class="card">
            <h3>Total Queries</h3>
            <p id="totalQueries">120</p>
        </div>
        <div class="card">
            <h3>Categories</h3>
            <p>8</p>
        </div>
        <div class="card">
            <h3>Top Issue</h3>
            <p>Product Issue</p>
        </div>
    </div>

    <!-- Charts -->
    <div class="chart-container">
        <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-container">
        <canvas id="lineChart"></canvas>
    </div>

    <!-- Query Section -->
    <div class="query-box">
        <h2>🤖 Classify Customer Query</h2>
        <textarea id="queryInput" placeholder="Enter customer query..."></textarea>
        <button onclick="classifyQuery()">⚡ Classify with AI</button>
    </div>

    <!-- Result -->
    <div id="resultBox" class="result hidden"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
